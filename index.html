
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: transparent; padding: 14px; color: #1a1a2e; font-size: 14px; }

h1 { font-size: 1.15rem; font-weight: 800; color: #c0392b; margin-bottom: 2px; }
.sub { font-size: 0.75rem; color: #888; margin-bottom: 14px; }

/* tabs */
.tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tab {
  padding: 6px 14px; border-radius: 20px; border: 2px solid #ddd;
  font-size: 0.78rem; font-weight: 700; cursor: pointer;
  transition: all 0.2s; background: white;
}
.tab.active { border-color: transparent; color: white; }
.tab-0.active { background: #2471a3; }
.tab-1.active { background: #1e8449; }
.tab-2.active { background: #d68910; }
.tab-3.active { background: #6c3483; }

/* progress */
.prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.prog-label { font-size: 0.75rem; font-weight: 700; min-width: 90px; }
.prog-bar { flex: 1; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
.prog-pct { font-size: 0.72rem; color: #888; min-width: 32px; text-align: right; }

/* sections */
.section { border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
.sec-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 13px; font-weight: 700; font-size: 0.88rem;
  cursor: pointer; user-select: none;
}
.sec-header .chev { margin-left: auto; transition: transform 0.3s; font-size: 0.8rem; }
.section.open .chev { transform: rotate(180deg); }
.sec-body { display: none; background: white; padding: 4px 13px 10px; }
.section.open .sec-body { display: block; }

.item {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 7px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer;
}
.item:last-child { border-bottom: none; }
.cb {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2.5px solid #ccc; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; color: white; transition: all 0.2s;
}
.item.done .cb { background: #27ae60; border-color: #27ae60; }
.item-info { flex: 1; }
.item-name { font-size: 0.84rem; font-weight: 600; }
.item.done .item-name { text-decoration: line-through; opacity: 0.4; }
.item-sub { font-size: 0.72rem; color: #888; margin-top: 1px; line-height: 1.4; }
.tag {
  font-size: 0.62rem; padding: 1px 6px; border-radius: 8px;
  font-weight: 600; flex-shrink: 0; align-self: center;
}
.tag-sheet { background: #d5f5e3; color: #1e8449; }
.tag-app   { background: #d6eaf8; color: #1a5276; }
.tag-web   { background: #f5eef8; color: #6c3483; }
.tag-line  { background: #e9f7ef; color: #1d8a4c; }
.tag-logic { background: #fef9e7; color: #9a7d0a; }

/* flow diagram */
.flow { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; }
.flow-box {
  padding: 6px 10px; border-radius: 8px; font-size: 0.72rem;
  font-weight: 700; text-align: center; line-height: 1.3;
}
.flow-arrow { font-size: 1rem; color: #aaa; }
.fb-blue   { background: #d6eaf8; color: #1a5276; }
.fb-green  { background: #d5f5e3; color: #1e8449; }
.fb-orange { background: #fdebd0; color: #935116; }
.fb-purple { background: #f5eef8; color: #6c3483; }

.panel { display: none; }
.panel.active { display: block; }

.overview-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 12px;
}
.ov-card {
  border-radius: 10px; padding: 10px 12px;
  font-size: 0.78rem;
}
.ov-card .ov-title { font-weight: 700; font-size: 0.85rem; margin-bottom: 4px; }
.ov-card .ov-pct { font-size: 1.4rem; font-weight: 800; }

.reset { display: block; margin: 12px auto 0; padding: 6px 20px;
  border-radius: 20px; border: none; background: #888;
  color: white; font-size: 0.78rem; cursor: pointer; }
.reset:hover { background: #c0392b; }
</style>
</head>
<body>

<h1>🏥 SVR Med ERP — ระบบบริหารจัดการธุรกิจครบวงจร</h1>
<div class="sub">สาขาจำกัดเดียนเก็บที่เมออลอง · คลิก task เพื่อ mark เสร็จ</div>

<!-- flow -->
<div class="flow">
  <div class="flow-box fb-blue">🏭 Vendor<br>คู่ค้า</div>
  <div class="flow-arrow">→</div>
  <div class="flow-box fb-green">📦 Inventory<br>คลังสินค้า</div>
  <div class="flow-arrow">→</div>
  <div class="flow-box fb-orange">🤝 CRM<br>งานขาย</div>
  <div class="flow-arrow">→</div>
  <div class="flow-box fb-purple">📊 Report<br>+ บัญชี</div>
</div>

<!-- tabs -->
<div class="tabs">
  <div class="tab tab-0 active" onclick="switchTab(0)">📊 Overview</div>
  <div class="tab tab-1" onclick="switchTab(1)">🏭 Vendor System</div>
  <div class="tab tab-2" onclick="switchTab(2)">📦 Inventory</div>
  <div class="tab tab-3" onclick="switchTab(3)">🤝 CRM & Report</div>
</div>

<!-- OVERVIEW -->
<div class="panel active" id="panel-0">
  <div class="overview-grid" id="ov-grid"></div>
  <div id="ov-progs"></div>
</div>

<!-- VENDOR -->
<div class="panel" id="panel-1"></div>
<!-- INVENTORY -->
<div class="panel" id="panel-2"></div>
<!-- CRM -->
<div class="panel" id="panel-3"></div>

<button class="reset" onclick="resetAll()">🔄 รีเซ็ต Progress ทั้งหมด</button>

<script>
const systems = [
  {
    name: "Vendor System", color: "#2471a3", bg: "#d6eaf8",
    sections: [
      {
        icon: "🗃️", title: "Vendor Database (Google Sheets)",
        items: [
          { name: "Sheet: Vendor List", sub: "ชื่อบริษัท ที่อยู่ เบอร์โทร ผู้ติดต่อ Payment terms", tag: "tag-sheet" },
          { name: "Sheet: Certificate Database", sub: "ไฟล์ใบ อย. วันหมดอายุ สินค้าที่เกี่ยวข้อง", tag: "tag-sheet" },
          { name: "Sheet: Product-Vendor Mapping", sub: "สินค้าแต่ละตัวซื้อจาก Vendor ไหน ราคาต้นทุน", tag: "tag-sheet" },
        ]
      },
      {
        icon: "📱", title: "Vendor App (AppSheet)",
        items: [
          { name: "AppSheet: ดูข้อมูล Vendor", sub: "ค้นหา กรอง แสดงรายละเอียด Vendor", tag: "tag-app" },
          { name: "AppSheet: อัปเดต Certificate", sub: "แจ้งเตือนใบ อย. ใกล้หมดอายุ", tag: "tag-app" },
          { name: "AppSheet: Pull Data ไปยัง Inventory", sub: "ดึงข้อมูลสินค้าจาก Vendor เข้าระบบคลัง", tag: "tag-app" },
        ]
      }
    ]
  },
  {
    name: "Inventory System", color: "#1e8449", bg: "#d5f5e3",
    sections: [
      {
        icon: "🗃️", title: "Stock Database (Google Sheets)",
        items: [
          { name: "Sheet: Stock Master", sub: "รหัสสินค้า ชื่อ หน่วย ราคา จำนวน Min stock", tag: "tag-sheet" },
          { name: "Sheet: Stock Movement", sub: "บันทึก In/Out แต่ละครั้ง วันที่ ผู้ทำรายการ", tag: "tag-sheet" },
          { name: "Sheet: Expiry Tracking", sub: "วันหมดอายุสินค้าแต่ละ Lot", tag: "tag-sheet" },
        ]
      },
      {
        icon: "📱", title: "Inventory App (AppSheet)",
        items: [
          { name: "AppSheet: Scan Barcode รับเข้า", sub: "Admin 1&2 สแกนสินค้าเข้าคลัง", tag: "tag-app" },
          { name: "AppSheet: Scan Barcode จ่ายออก", sub: "Admin 1&2 สแกนสินค้าออกคลัง", tag: "tag-app" },
          { name: "Logic: แจ้งเตือน Stock ต่ำ", sub: "เมื่อ stock < Min → แจ้ง LINE อัตโนมัติ", tag: "tag-logic" },
          { name: "Logic: แจ้งเตือนวันหมดอายุ", sub: "ส่ง LINE Notify ก่อนหมดอายุ 30/60 วัน", tag: "tag-line" },
        ]
      }
    ]
  },
  {
    name: "CRM & Report", color: "#d68910", bg: "#fdebd0",
    sections: [
      {
        icon: "🗃️", title: "CRM Database (Google Sheets)",
        items: [
          { name: "Sheet: Customer / ผู้ติดต่อ", sub: "ชื่อ โรงพยาบาล แผนก ผู้ซื้อ ประวัติ", tag: "tag-sheet" },
          { name: "Sheet: Sales Pipeline", sub: "Deal ที่กำลังเจรจา สถานะ มูลค่า ขั้นตอน", tag: "tag-sheet" },
          { name: "Sheet: Purchase History", sub: "ประวัติการซื้อ สินค้า จำนวน ราคา วันที่", tag: "tag-sheet" },
          { name: "Sheet: Accounting Export", sub: "ข้อมูลส่งให้บัญชี รายรับ-รายจ่าย", tag: "tag-sheet" },
        ]
      },
      {
        icon: "📱", title: "CRM App (AppSheet)",
        items: [
          { name: "AppSheet: ดู/แก้ไข Customer", sub: "Owner/Secretary เข้าถึงข้อมูลลูกค้า", tag: "tag-app" },
          { name: "AppSheet: อัปเดต Sales Pipeline", sub: "เปลี่ยนสถานะ Deal Close Deal", tag: "tag-app" },
          { name: "AppSheet: Select Products for Proposal", sub: "เลือกสินค้าจาก Stock เพื่อเสนอราคา", tag: "tag-app" },
        ]
      },
      {
        icon: "📊", title: "Report & Automation",
        items: [
          { name: "รายงาน: Monthly Sales Report", sub: "สรุปยอดขายต่อเดือน แยกสินค้า ลูกค้า", tag: "tag-sheet" },
          { name: "Auto: ส่งข้อมูลบัญชีอัตโนมัติ", sub: "Export Accounting Data ส่ง Email/LINE", tag: "tag-logic" },
          { name: "Web Dashboard: ภาพรวม ERP", sub: "หน้า Web แสดง KPI Stock Sales ทั้งระบบ", tag: "tag-web" },
        ]
      }
    ]
  }
];

let state = {};
try { state = JSON.parse(localStorage.getItem('svr_full') || '{}'); } catch(e){}

function key(si,sec,ii) { return `${si}-${sec}-${ii}`; }

function initState() {
  systems.forEach((sys, si) => sys.sections.forEach((sec, seci) => sec.items.forEach((_, ii) => {
    const k = key(si, seci, ii);
    if (!(k in state)) state[k] = false;
  })));
}

function save() { try { localStorage.setItem('svr_full', JSON.stringify(state)); } catch(e){} }

function getProgress(si) {
  let total = 0, done = 0;
  systems[si].sections.forEach((sec, seci) => sec.items.forEach((_, ii) => {
    total++;
    if (state[key(si, seci, ii)]) done++;
  }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function getTotal() {
  let total = 0, done = 0;
  systems.forEach((_, si) => { const p = getProgress(si); total += p.total; done += p.done; });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function renderOverview() {
  const colors = ['#2471a3','#1e8449','#d68910'];
  const bgs = ['#d6eaf8','#d5f5e3','#fdebd0'];
  const icons = ['🏭','📦','🤝'];
  let gridHtml = '';
  systems.forEach((sys, si) => {
    const p = getProgress(si);
    gridHtml += `<div class="ov-card" style="background:${bgs[si]}">
      <div class="ov-title" style="color:${colors[si]}">${icons[si]} ${sys.name}</div>
      <div class="ov-pct" style="color:${colors[si]}">${p.pct}%</div>
      <div style="font-size:0.72rem;color:#666">${p.done}/${p.total} tasks</div>
    </div>`;
  });
  const tot = getTotal();
  gridHtml += `<div class="ov-card" style="background:#f5eef8">
    <div class="ov-title" style="color:#6c3483">📊 ภาพรวม</div>
    <div class="ov-pct" style="color:#6c3483">${tot.pct}%</div>
    <div style="font-size:0.72rem;color:#666">${tot.done}/${tot.total} tasks ทั้งหมด</div>
  </div>`;
  document.getElementById('ov-grid').innerHTML = gridHtml;

  let progsHtml = '';
  systems.forEach((sys, si) => {
    const p = getProgress(si);
    progsHtml += `<div class="prog-row">
      <div class="prog-label" style="color:${colors[si]}">${icons[si]} ${sys.name}</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p.pct}%;background:${colors[si]}"></div></div>
      <div class="prog-pct">${p.pct}%</div>
    </div>`;
  });
  document.getElementById('ov-progs').innerHTML = progsHtml;
}

function renderSystem(si) {
  const sys = systems[si];
  const panel = document.getElementById(`panel-${si+1}`);
  const sectionColors = ['#2471a3','#1e8449','#d68910'];
  const secBgs = ['#eaf4fb','#eafaf1','#fef9e7'];
  let html = '';
  sys.sections.forEach((sec, seci) => {
    const doneCount = sec.items.filter((_, ii) => state[key(si, seci, ii)]).length;
    html += `<div class="section open" id="sec-${si}-${seci}">
      <div class="sec-header" style="background:${secBgs[si % 3]};color:${sectionColors[si]}" onclick="toggleSec('sec-${si}-${seci}')">
        <span>${sec.icon}</span>
        <span>${sec.title}</span>
        <span style="font-size:0.72rem;opacity:0.7;margin-left:4px">(${doneCount}/${sec.items.length})</span>
        <span class="chev">▼</span>
      </div>
      <div class="sec-body">
        ${sec.items.map((item, ii) => {
          const k = key(si, seci, ii);
          const done = state[k];
          return `<div class="item ${done?'done':''}" onclick="toggleItem(${si},${seci},${ii})">
            <div class="cb">${done?'✓':''}</div>
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-sub">${item.sub}</div>
            </div>
            <span class="tag ${item.tag}">${item.tag==='tag-sheet'?'Sheets':item.tag==='tag-app'?'AppSheet':item.tag==='tag-web'?'Web':item.tag==='tag-line'?'LINE':'Logic'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  panel.innerHTML = html;
}

function toggleSec(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleItem(si, seci, ii) {
  const k = key(si, seci, ii);
  state[k] = !state[k];
  save(); renderAll();
  switchTab(activeTab);
  // keep section open
  const el = document.getElementById(`sec-${si}-${seci}`);
  if(el) el.classList.add('open');
}

let activeTab = 0;
function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', i===t));
  document.querySelectorAll('.panel').forEach((el,i) => el.classList.toggle('active', i===t));
  if (t === 0) renderOverview();
  else renderSystem(t-1);
}

function renderAll() {
  renderOverview();
  [0,1,2].forEach(si => renderSystem(si));
}

function resetAll() {
  if(confirm('รีเซ็ต Progress ทั้งหมด?')) {
    Object.keys(state).forEach(k => state[k]=false);
    save(); renderAll(); switchTab(activeTab);
  }
}

initState();
renderAll();
</script>
</body>
</html>
